<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UQT S.A. | v6.7.3 Reparado</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --azul: #16538d; --verde: #32CD32; --fondo: #0a0a0a; --panel: #1a1a1a; --oro: #FFD700; --texto: #ffffff; --rojo: #ff4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--fondo); color: var(--texto); overflow-x: hidden; }
        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; background: #111; color: var(--verde); border: 1px solid #333; box-sizing: border-box; outline: none; }
        .btn-uqt { background: var(--verde); color: #000; border: none; padding: 16px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 8px; transition: 0.3s; }
        .btn-uqt:active { transform: scale(0.98); }
        #marquee-top { background: #000; color: var(--oro); border-bottom: 1px solid var(--oro); padding: 5px 0; font-family: monospace; font-weight: bold; }
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .login-alert-box { background: rgba(255, 215, 0, 0.1); border: 2px solid var(--oro); padding: 15px; border-radius: 8px; color: var(--oro); font-weight: bold; margin-bottom: 15px; width: 100%; max-width: 320px; text-align: center; font-size: 0.9rem; }
        #anuncio-img-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 60000; align-items: center; justify-content: center; }
        .close-anuncio { position: absolute; top: 20px; right: 20px; color: white; font-size: 2rem; cursor: pointer; font-weight: bold; }
        .header-top { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #222; background: #000; position: sticky; top: 0; z-index: 10; font-family: monospace; align-items: center; }
        .sec-divider { border-left: 4px solid var(--verde); padding-left: 12px; margin: 25px 20px 10px; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .list-container { padding: 0 20px; }
        .item-card { background: var(--panel); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .item-card h3 { margin: 0; color: var(--verde); font-size: 1.1rem; }
        #admin-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 30000; padding: 25px; overflow-y: auto; }
        .receptor-card { background: #111; border: 1px solid #333; padding: 10px; border-radius: 6px; margin-bottom: 10px; font-size: 0.8rem; }
        .parada-edit { background: #222; padding: 10px; border-radius: 8px; margin-top: 5px; }
        #carta-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:70000; padding:20px; overflow-y:auto; flex-direction:column; align-items:center; }
        .hoja-uqt { background-image: url('https://i.postimg.cc/DfSB1gr8/1778130391359-(1).jpg'); background-size: 100% 100%; width: 100%; max-width: 450px; min-height: 600px; padding: 100px 40px 60px 40px; color: #000; box-sizing: border-box; font-family: serif; position: relative; }
    </style>
</head>
<body onload="inicializarApp()">

    <div id="marquee-top"><marquee id="txt-marquee" scrollamount="7">...</marquee></div>

    <div id="anuncio-img-overlay">
        <span class="close-anuncio" onclick="this.parentElement.style.display='none'">X</span>
        <img id="img-anuncio-src" src="" style="max-width: 90%; max-height: 80%; border: 3px solid var(--oro); border-radius: 15px;">
    </div>

    <div id="carta-modal">
        <button class="btn-uqt" style="width:auto; margin-bottom:10px; background:var(--rojo); color:#fff;" onclick="document.getElementById('carta-modal').style.display='none'">CERRAR CORREO</button>
        <div class="hoja-uqt">
            <div id="carta-contenido" style="white-space: pre-wrap; line-height: 1.4; font-size: 0.95rem;"></div>
        </div>
    </div>

    <div id="auth-screen">
        <img src="https://i.postimg.cc/sgPtr7Cm/1773207513022-2.jpg" height="100" style="border-radius: 50%; border: 3px solid var(--verde); margin-bottom: 15px;">
        <div class="login-alert-box" id="txt-login-alert">Cargando...</div>
        <div id="login-form" style="width: 100%; max-width: 320px;">
            <input type="email" id="log-email" placeholder="Usuario institucional">
            <input type="password" id="log-pass" placeholder="Contraseña">
            <button class="btn-uqt" onclick="ingresar()">🔐 Acceder al Sistema</button>
            <button class="btn-uqt" style="background: #111; color: #fff; margin-top: 10px;" onclick="accesoAdmin()">🛠️ Admin Panel</button>
        </div>
    </div>

    <div id="app-6" style="display:none;">
        <div class="header-top">
            <span>UQT S.A. ● FERROVIARIA</span>
            <span id="reloj">--:--</span>
            <button onclick="cerrarSesion()" style="background:var(--rojo); color:white; border:none; padding:5px 10px; border-radius:5px; font-size:0.7rem; font-weight:bold;">SALIR</button>
        </div>

        <div class="sec-divider">📬 Buzon UQT</div>
        <div style="padding: 0 20px;">
            <div id="lista-correos"></div>
        </div>

        <div class="sec-divider">🚉 Estaciones de Tren</div>
        <div id="lista-trenes" class="list-container"></div>

        <div class="sec-divider">🚌 Paradas de Bus</div>
        <div id="lista-buses" class="list-container"></div>

        <div id="compra-interactiva" style="display:none; padding: 20px; background: #000; border: 2px solid var(--oro); margin: 20px; border-radius: 15px;">
            <h3 style="color:var(--oro); margin-top:0;">🎫 Compra de Boleto</h3>
            <p id="compra-info" style="font-size:0.9rem;"></p>
            <label>Desde:</label>
            <select id="compra-desde"></select>
            <label>Hasta:</label>
            <input type="text" id="compra-hasta" readonly style="background:#222; color:#fff">
            <p>Precio Tramo: <b id="compra-precio">R$ 0.00</b></p>
            <button class="btn-uqt" onclick="confirmarCompra()">CONFIRMAR BOLETO</button>
            <button class="btn-uqt" style="background:#444; color:white; margin-top:5px;" onclick="this.parentElement.style.display='none'">CANCELAR</button>
        </div>

        <div class="sec-divider">🎧 Soporte Técnico</div>
        <div style="padding: 20px;">
            <div class="item-card" style="cursor:default">
                <textarea id="soporte-msg" placeholder="Describe tu problema aquí..."></textarea>
                <button class="btn-uqt" onclick="enviarSoporte()">Enviar Reporte</button>
            </div>
        </div>
    </div>

    <div id="admin-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:var(--verde)">⚙️ RECEPTOR UNIVERSAL</h2>
            <button onclick="location.reload()" style="background:var(--rojo); color:white; border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">SALIR</button>
        </div>

        <div class="sec-divider">📧 ENVIAR CORREO UQT</div>
        <div style="background:var(--panel); padding:15px; border-radius:10px; margin-bottom:20px;">
            <select id="adm-c-usuario-select">
                <option value="">Cargando usuarios...</option>
            </select>
            <input type="text" id="adm-c-asunto" placeholder="Asunto del correo">
            <textarea id="adm-c-texto" placeholder="Cuerpo del mensaje oficial..."></textarea>
            <select id="adm-c-remitente">
                <option value="Admin@UQTServicios.com">Admin@UQTServicios.com</option>
                <option value="Negocios@UQTServicios.com">Negocios@UQTServicios.com</option>
            </select>
            <button class="btn-uqt" onclick="enviarCorreoInterno()">PUBLICAR CORREO</button>
        </div>

        <div class="sec-divider">📢 Configuración Visual</div>
        <input type="text" id="adm-marquee" placeholder="Texto Marquesina">
        <input type="text" id="adm-login-txt" placeholder="Texto Login">
        <input type="text" id="adm-img-url" placeholder="URL Imagen (o 'QuitarImagen')">
        <button class="btn-uqt" onclick="actualizarConfig()">Guardar Config</button>
        
        <div id="adm-lista-borrar" style="margin-top:20px;"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA58MXpItx1F9zNnJbyeS_4FT_onYx9wig", authDomain: "uqt-virtual.firebaseapp.com", projectId: "uqt-virtual", storageBucket: "uqt-virtual.appspot.com", messagingSenderId: "777641217730", appId: "1:777641217730:web:8c5b5f9b4c7d8e2a" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        let globalServicios = [];
        let servicioSeleccionado = null;

        function inicializarApp() {
            db.collection('config').doc('visuales').onSnapshot(d => {
                if(d.exists){
                    const data = d.data();
                    document.getElementById('txt-marquee').innerText = data.marquee || "";
                    document.getElementById('txt-login-alert').innerText = data.loginTxt || "";
                    if(data.imgAnuncio && data.imgAnuncio !== "QuitarImagen") {
                        document.getElementById('img-anuncio-src').src = data.imgAnuncio;
                        document.getElementById('anuncio-img-overlay').style.display = 'flex';
                    }
                }
            });

            db.collection('itinerarios').doc('servicios').onSnapshot(d => {
                if(d.exists) {
                    globalServicios = d.data().servicios || [];
                    renderizarServicios(globalServicios);
                }
            });

            auth.onAuthStateChanged(user => {
                if(user) {
                    // Cargar correos dirigidos al usuario actual
                    db.collection('buzon').where("para", "==", user.email).orderBy("timestamp", "desc").onSnapshot(snap => {
                        const lista = document.getElementById('lista-correos');
                        lista.innerHTML = snap.docs.map(doc => {
                            const c = doc.data();
                            return `<div class="item-card" onclick="abrirCarta('${c.remitente}', '${c.asunto}', '${c.mensaje}')">
                                <p style="color:var(--oro); margin:0; font-size:0.8rem;">De: ${c.remitente}</p>
                                <h3 style="font-size:1rem;">${c.asunto}</h3>
                                <button class="btn-uqt" style="padding:5px; font-size:0.7rem; margin-top:5px; width:100px;">ABRIR</button>
                            </div>`;
                        }).join('');
                    });
                    cargarUsuariosAdmin();
                }
            });
        }

        function cargarUsuariosAdmin() {
            db.collection('usuarios').onSnapshot(snap => {
                const select = document.getElementById('adm-c-usuario-select');
                select.innerHTML = '<option value="">-- Seleccionar Usuario --</option>';
                snap.forEach(doc => {
                    const email = doc.id;
                    select.innerHTML += `<option value="${email}">${email}</option>`;
                });
            });
        }

        async function enviarCorreoInterno() {
            const para = document.getElementById('adm-c-usuario-select').value;
            const asunto = document.getElementById('adm-c-asunto').value;
            const mensaje = document.getElementById('adm-c-texto').value;
            const remitente = document.getElementById('adm-c-remitente').value;

            if(!para || !asunto || !mensaje) return alert("Faltan datos");

            await db.collection('buzon').add({
                para, asunto, mensaje, remitente,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("UQTmail enviado.");
            document.getElementById('adm-c-asunto').value = "";
            document.getElementById('adm-c-texto').value = "";
        }

        function abrirCarta(de, asunto, msg) {
            document.getElementById('carta-modal').style.display = 'flex';
            document.getElementById('carta-contenido').innerHTML = `<b>DE:</b> ${de}<br><b>ASUNTO:</b> ${asunto}<hr>${msg.replace(/\n/g, '<br>')}`;
        }

        function ingresar() {
            const email = document.getElementById('log-email').value;
            const pass = document.getElementById('log-pass').value;
            auth.signInWithEmailAndPassword(email, pass)
            .then(async () => {
                // REPARACIÓN CLAVE: Crear/Actualizar documento en colección 'usuarios' usando el email como ID
                await db.collection('usuarios').doc(email).set({
                    email: email,
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                document.getElementById('auth-screen').style.display='none'; 
                document.getElementById('app-6').style.display='block'; 
            }).catch(() => alert("Error"));
        }

        function renderizarServicios(servicios) {
            const t = document.getElementById('lista-trenes'); const b = document.getElementById('lista-buses');
            t.innerHTML = ""; b.innerHTML = "";
            servicios.forEach(s => {
                s.paradas.forEach(p => {
                    const html = `<div class="item-card" onclick="iniciarCompra('${s.ramal}', '${p.nombre}')">
                        <p style="color:var(--oro); font-weight:bold; margin:0;">${s.ramal}</p>
                        <h3>${p.nombre}</h3><p>Hora: ${p.hora}</p></div>`;
                    if(s.medio === "Tren") t.innerHTML += html; else b.innerHTML += html;
                });
            });
        }

        function iniciarCompra(sId, pNombre) {
            const s = globalServicios.find(x => x.ramal === sId);
            servicioSeleccionado = s;
            document.getElementById('compra-interactiva').style.display = 'block';
            document.getElementById('compra-info').innerText = `${s.ramal} a ${pNombre}`;
            document.getElementById('compra-hasta').value = pNombre;
            document.getElementById('compra-precio').innerText = `R$ ${s.precioTramo}`;
            const idx = s.paradas.findIndex(p => p.nombre === pNombre);
            document.getElementById('compra-desde').innerHTML = s.paradas.slice(0, idx).map(p => `<option>${p.nombre}</option>`).join('');
        }

        async function confirmarCompra() {
            const ticket = "UQT-" + Math.random().toString(36).substr(2,6).toUpperCase();
            await db.collection('boletos_emitidos').add({
                boletoID: ticket, usuarioEmail: auth.currentUser.email,
                desde: document.getElementById('compra-desde').value,
                hasta: document.getElementById('compra-hasta').value,
                servicio: servicioSeleccionado.ramal, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Ticket: " + ticket);
            document.getElementById('compra-interactiva').style.display = 'none';
        }

        function cerrarSesion() { auth.signOut().then(() => location.reload()); }
        function accesoAdmin() { if(prompt("Acceso:") === "UnionQuintanaTuri2012@_") document.getElementById('admin-overlay').style.display = 'block'; }
        async function actualizarConfig() {
            await db.collection('config').doc('visuales').set({ marquee: document.getElementById('adm-marquee').value, loginTxt: document.getElementById('adm-login-txt').value, imgAnuncio: document.getElementById('adm-img-url').value }, { merge: true });
            alert("OK");
        }
        async function enviarSoporte() {
            await db.collection('soporte').add({ usuario: auth.currentUser.email, mensaje: document.getElementById('soporte-msg').value, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            alert("Enviado"); document.getElementById('soporte-msg').value = "";
        }
        setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
