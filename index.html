<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UQT S.A. | v6.7.0 Bakery Edition</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --azul: #16538d; --verde: #32CD32; --fondo: #0a0a0a; --panel: #1a1a1a; --oro: #FFD700; --texto: #ffffff; --rojo: #ff4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--fondo); color: var(--texto); overflow-x: hidden; }
        
        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; background: #111; color: var(--verde); border: 1px solid #333; box-sizing: border-box; outline: none; }
        .btn-uqt { background: var(--verde); color: #000; border: none; padding: 16px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 8px; transition: 0.3s; }
        .btn-uqt:active { transform: scale(0.98); }
        
        #marquee-top { background: #000; color: var(--oro); border-bottom: 1px solid var(--oro); padding: 5px 0; font-family: monospace; font-weight: bold; }
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .login-alert-box { background: rgba(255, 215, 0, 0.1); border: 2px solid var(--oro); padding: 15px; border-radius: 8px; color: var(--oro); font-weight: bold; margin-bottom: 15px; width: 100%; max-width: 320px; text-align: center; font-size: 0.9rem; }
        
        .header-top { display: flex; flex-direction: column; padding: 10px 20px; border-bottom: 1px solid #222; background: #000; position: sticky; top: 0; z-index: 10; font-family: monospace; }
        .uqt-card-info { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 5px 10px; border-radius: 5px; margin-top: 5px; border: 1px solid var(--oro); }

        .sec-divider { border-left: 4px solid var(--verde); padding-left: 12px; margin: 25px 20px 10px; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .item-card { background: var(--panel); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; cursor: pointer; transition: 0.2s; }
        
        #admin-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 30000; padding: 25px; overflow-y: auto; }
        .receptor-card { background: #111; border: 1px solid #333; padding: 10px; border-radius: 6px; margin-bottom: 10px; font-size: 0.8rem; }
        
        #carta-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:70000; padding:20px; overflow-y:auto; flex-direction:column; align-items:center; }
        .hoja-uqt { background-image: url('https://i.postimg.cc/DfSB1gr8/1778130391359-(1).jpg'); background-size: 100% 100%; width: 100%; max-width: 450px; min-height: 600px; padding: 100px 40px 60px 40px; color: #000; box-sizing: border-box; font-family: serif; position: relative; }
    </style>
</head>
<body onload="inicializarApp()">

    <div id="marquee-top"><marquee id="txt-marquee" scrollamount="7">...</marquee></div>

    <div id="carta-modal">
        <button class="btn-uqt" style="width:auto; margin-bottom:10px; background:var(--rojo); color:#fff;" onclick="document.getElementById('carta-modal').style.display='none'">CERRAR CORREO</button>
        <div class="hoja-uqt"><div id="carta-contenido" style="white-space: pre-wrap; line-height: 1.4; font-size: 0.95rem;"></div></div>
    </div>

    <div id="auth-screen">
        <img src="https://i.postimg.cc/sgPtr7Cm/1773207513022-2.jpg" height="100" style="border-radius: 50%; border: 3px solid var(--verde); margin-bottom: 15px;">
        <div class="login-alert-box" id="txt-login-alert">Cargando...</div>
        <div id="login-form" style="width: 100%; max-width: 320px;">
            <input type="email" id="log-email" placeholder="Usuario institucional">
            <input type="password" id="log-pass" placeholder="Contraseña">
            <button class="btn-uqt" onclick="ingresar()">🔐 Acceder al Sistema</button>
            <button class="btn-uqt" style="background: #111; color: #fff; margin-top: 10px;" onclick="accesoAdmin()">🛠️ Admin Panel</button>
        </div>
    </div>

    <div id="app-6" style="display:none;">
        <div class="header-top">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span id="rol-tag" style="font-weight:bold; color:var(--verde);">UQT S.A.</span>
                <span id="reloj">--:--</span>
                <button onclick="cerrarSesion()" style="background:var(--rojo); color:white; border:none; padding:5px 10px; border-radius:5px; font-size:0.7rem;">SALIR</button>
            </div>
            <div class="uqt-card-info">
                <span>💳 UQT Card: <b id="uqt-saldo">R$ 0.00</b></span>
                <button onclick="cargarSaldo()" style="background:var(--oro); border:none; padding:2px 8px; border-radius:4px; font-size:0.6rem; font-weight:bold;">CANJEAR CODE</button>
            </div>
        </div>

        <div class="sec-divider">📬 UQTmail Interno</div>
        <div style="padding: 0 20px;"><div id="lista-correos"></div></div>

        <div class="sec-divider">🚉 Estaciones de Tren</div>
        <div id="lista-trenes" style="padding: 0 20px;"></div>

        <div id="compra-interactiva" style="display:none; padding: 20px; background: #000; border: 2px solid var(--oro); margin: 20px; border-radius: 15px;">
            <h3 style="color:var(--oro); margin-top:0;">🎫 Compra de Boleto</h3>
            <p id="compra-info"></p>
            <label>Desde:</label><select id="compra-desde"></select>
            <label>Hasta:</label><input type="text" id="compra-hasta" readonly>
            <p>Precio Original: <b id="compra-precio-base">R$ 0.00</b></p>
            <p style="color:var(--verde)">Descuento por Rango: <b id="compra-descuento">0%</b></p>
            <p>Total a Descontar: <b id="compra-precio-final" style="color:var(--oro); font-size:1.2rem;">R$ 0.00</b></p>
            <button class="btn-uqt" onclick="confirmarCompra()">PAGAR CON UQT CARD</button>
            <button class="btn-uqt" style="background:#444; color:white; margin-top:5px;" onclick="this.parentElement.style.display='none'">CANCELAR</button>
        </div>
    </div>

    <div id="admin-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:var(--verde)">⚙️ RECEPTOR UNIVERSAL</h2>
            <button onclick="location.reload()" style="background:var(--rojo); color:white; border:none; padding:8px 15px; border-radius:5px;">SALIR</button>
        </div>

        <div class="sec-divider">📧 ENVIAR UQTmail</div>
        <div style="background:var(--panel); padding:15px; border-radius:10px;">
            <label>Seleccionar Destinatario:</label>
            <select id="adm-c-usuario-list"><option value="">Cargando usuarios...</option></select>
            <input type="text" id="adm-c-asunto" placeholder="Asunto">
            <textarea id="adm-c-texto" placeholder="Mensaje..."></textarea>
            <button class="btn-uqt" onclick="enviarCorreoInterno()">PUBLICAR CORREO</button>
        </div>

        <div class="sec-divider">💸 GENERAR CARGA (ADMIN)</div>
        <div style="background:var(--panel); padding:15px; border-radius:10px;">
            <input type="number" id="adm-cash-monto" placeholder="Monto R$">
            <button class="btn-uqt" style="background:var(--oro)" onclick="generarCodigoCarga()">GENERAR CÓDIGO</button>
            <div id="ultimo-codigo" style="margin-top:10px; color:var(--oro); font-family:monospace; text-align:center; font-size:1.2rem;"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA58MXpItx1F9zNnJbyeS_4FT_onYx9wig", authDomain: "uqt-virtual.firebaseapp.com", projectId: "uqt-virtual", storageBucket: "uqt-virtual.appspot.com", messagingSenderId: "777641217730", appId: "1:777641217730:web:8c5b5f9b4c7d8e2a" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        let userData = { saldo: 0, rango: "Miga" };
        let globalServicios = [];
        let servicioSeleccionado = null;

        function inicializarApp() {
            // Escuchar cambios de usuario y rango/saldo
            auth.onAuthStateChanged(user => {
                if(user) {
                    db.collection('usuarios').doc(user.email).onSnapshot(doc => {
                        if(doc.exists) {
                            userData = doc.data();
                            document.getElementById('uqt-saldo').innerText = `R$ ${userData.saldo.toFixed(2)}`;
                            document.getElementById('rol-tag').innerText = `UQT | ${userData.rango}`;
                            document.getElementById('rol-tag').style.color = userData.rango === "Pan Premium" ? "var(--oro)" : "var(--verde)";
                        } else {
                            // Crear perfil si no existe
                            db.collection('usuarios').doc(user.email).set({ email: user.email, saldo: 0, rango: "Miga" });
                        }
                    });

                    // Cargar lista de usuarios para el Admin
                    db.collection('usuarios').get().then(snap => {
                        const select = document.getElementById('adm-c-usuario-list');
                        select.innerHTML = snap.docs.map(d => `<option value="${d.id}">${d.id} [${d.data().rango}]</option>`).join('');
                    });

                    // Cargar Buzón
                    db.collection('buzon').where("para", "==", user.email).orderBy("timestamp", "desc").onSnapshot(snap => {
                        const lista = document.getElementById('lista-correos');
                        lista.innerHTML = snap.docs.map(doc => {
                            const c = doc.data();
                            return `<div class="item-card" onclick="abrirCarta('${c.remitente}', '${c.asunto}', '${c.mensaje}')">
                                <p style="color:var(--oro); margin:0; font-size:0.8rem;">De: ${c.remitente}</p>
                                <h3 style="font-size:1rem;">${c.asunto}</h3>
                            </div>`;
                        }).join('');
                    });
                }
            });

            db.collection('itinerarios').doc('servicios').onSnapshot(d => {
                if(d.exists) {
                    globalServicios = d.data().servicios || [];
                    renderizarServicios(globalServicios);
                }
            });

            db.collection('config').doc('visuales').onSnapshot(d => {
                if(d.exists) document.getElementById('txt-marquee').innerText = d.data().marquee || "";
            });
        }

        // Lógica de Compra con Descuento por Rango
        function iniciarCompra(sId, pNombre) {
            const s = globalServicios.find(x => x.ramal === sId);
            if(!s) return;
            servicioSeleccionado = s;
            const precioBase = s.precioTramo || 0;
            let dto = 0;
            if(userData.rango === "Pan Premium") dto = 0.50;
            else if(userData.rango === "Pan") dto = 0.25;

            const final = precioBase * (1 - dto);

            document.getElementById('compra-interactiva').style.display = 'block';
            document.getElementById('compra-info').innerText = `Servicio: ${s.ramal}`;
            document.getElementById('compra-hasta').value = pNombre;
            document.getElementById('compra-precio-base').innerText = `R$ ${precioBase.toFixed(2)}`;
            document.getElementById('compra-descuento').innerText = `${dto * 100}%`;
            document.getElementById('compra-precio-final').innerText = `R$ ${final.toFixed(2)}`;
            
            const idx = s.paradas.findIndex(p => p.nombre === pNombre);
            document.getElementById('compra-desde').innerHTML = s.paradas.slice(0, idx).map(p => `<option>${p.nombre}</option>`).join('');
        }

        async function confirmarCompra() {
            const total = parseFloat(document.getElementById('compra-precio-final').innerText.replace("R$ ",""));
            if(userData.saldo < total) return alert("Saldo insuficiente en UQT Card");

            const ticket = "UQT-" + Math.random().toString(36).substr(2,6).toUpperCase();
            await db.collection('usuarios').doc(auth.currentUser.email).update({
                saldo: userData.saldo - total
            });

            await db.collection('boletos_emitidos').add({
                boletoID: ticket, usuario: auth.currentUser.email,
                precio: total, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("¡VIAJE CONFIRMADO!\nBoleto: " + ticket);
            document.getElementById('compra-interactiva').style.display = 'none';
        }

        // Sistema de Carga
        async function cargarSaldo() {
            const code = prompt("Ingrese su código de carga UQT:");
            if(!code) return;
            const ref = db.collection('codes_carga').doc(code);
            const doc = await ref.get();
            if(doc.exists && !doc.data().usado) {
                const monto = doc.data().monto;
                await db.collection('usuarios').doc(auth.currentUser.email).update({
                    saldo: userData.saldo + monto
                });
                await ref.update({ usado: true, usadoPor: auth.currentUser.email });
                alert("Carga exitosa: R$ " + monto);
            } else alert("Código inválido o ya usado.");
        }

        // Admin: Generar Códigos
        async function generarCodigoCarga() {
            const monto = parseFloat(document.getElementById('adm-cash-monto').value);
            if(!monto) return alert("Ingrese monto");
            const code = "CASH-" + Math.random().toString(36).substr(2,8).toUpperCase();
            await db.collection('codes_carga').doc(code).set({ monto, usado: false });
            document.getElementById('ultimo-codigo').innerText = code;
        }

        async function enviarCorreoInterno() {
            const para = document.getElementById('adm-c-usuario-list').value;
            const asunto = document.getElementById('adm-c-asunto').value;
            const mensaje = document.getElementById('adm-c-texto').value;
            if(!para || !asunto) return alert("Faltan datos");

            await db.collection('buzon').add({
                para, asunto, mensaje, remitente: "Admin@UQTServicios.com",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("UQTmail enviado");
        }

        function renderizarServicios(servicios) {
            const t = document.getElementById('lista-trenes'); t.innerHTML = "";
            servicios.forEach(s => {
                s.paradas.forEach(p => {
                    t.innerHTML += `<div class="item-card" onclick="iniciarCompra('${s.ramal}', '${p.nombre}')">
                        <p style="color:var(--oro); font-weight:bold; margin:0;">${s.ramal}</p>
                        <h3>${p.nombre}</h3><p>Hora: ${p.hora} | Tramo: R$ ${s.precioTramo}</p>
                    </div>`;
                });
            });
        }

        function ingresar() {
            auth.signInWithEmailAndPassword(document.getElementById('log-email').value, document.getElementById('log-pass').value)
            .then(() => { document.getElementById('auth-screen').style.display='none'; document.getElementById('app-6').style.display='block'; })
            .catch(() => alert("Error de acceso"));
        }

        function abrirCarta(de, asu, msg) {
            document.getElementById('carta-modal').style.display='flex';
            document.getElementById('carta-contenido').innerHTML = `<center><b>COMUNICADO UQT</b></center><br><b>DE:</b> ${de}<br><b>ASUNTO:</b> ${asu}<hr>${msg.replace(/\n/g, '<br>')}`;
        }
        function cerrarSesion() { auth.signOut().then(() => location.reload()); }
        function accesoAdmin() { if(prompt("Clave:") === "UnionQuintanaTuri2012@_") document.getElementById('admin-overlay').style.display = 'block'; }
        setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
